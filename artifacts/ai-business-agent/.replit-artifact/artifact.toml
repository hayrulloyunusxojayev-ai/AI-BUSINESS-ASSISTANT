kind = "web"
previewPath = "/"
title = "AI Business Agent"
version = "1.0.0"
id = "artifacts/ai-business-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21503

[services.development]
run = "pnpm --filter @workspace/ai-business-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-business-agent", "run", "build" ]
publicDir = "artifacts/ai-business-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21503"
BASE_PATH = "/"
